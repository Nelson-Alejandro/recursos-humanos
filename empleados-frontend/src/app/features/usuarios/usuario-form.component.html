<div class="form-layout">
  <div class="form-container">
    <div class="form-header">
      <button class="btn-back" (click)="cancelar()">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Volver
      </button>
      <div>
        <h2>{{ isEdit ? 'Editar usuario RRHH' : 'Nuevo usuario RRHH' }}</h2>
        <p>{{ isEdit ? 'Modifica los datos de acceso' : 'Crea una cuenta de acceso para personal de Recursos Humanos' }}</p>
      </div>
    </div>

    <div class="alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert-success" *ngIf="success">✓ {{ success }}</div>

    <div class="loading-state" *ngIf="loadingData">
      <div class="spinner-lg"></div><p>Cargando datos...</p>
    </div>

    <form (ngSubmit)="onSubmit()" *ngIf="!loadingData" #f="ngForm">
      <div class="form-card">
        <h3 class="section-title">Datos de acceso</h3>
        <div class="grid-2">
          <div class="field">
            <label>Usuario *</label>
            <input type="text" [(ngModel)]="usuario.username" name="username" required placeholder="jperez"/>
          </div>
          <div class="field">
            <label>Rol</label>
            <input type="text" value="RRHH" disabled/>
          </div>
          <div class="field" style="grid-column: 1 / -1;">
            <label>{{ isEdit ? 'Nueva contraseña (déjalo vacío para no cambiarla)' : 'Contraseña *' }}</label>
            <div class="password-wrapper">
              <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="usuario.password" name="password"
                     [required]="!isEdit" placeholder="••••••••"/>
              <button type="button" class="toggle-password" (click)="showPassword = !showPassword" tabindex="-1">
                <svg *ngIf="!showPassword" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                  <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <svg *ngIf="showPassword" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.584 10.587a2 2 0 002.828 2.83M9.363 5.365A9.466 9.466 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.523 10.523 0 01-1.948 3.448M6.61 6.61A10.523 10.523 0 002.458 12c1.274 4.057 5.065 7 9.542 7a9.477 9.477 0 004.635-1.21"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="loading || f.invalid">
          <span *ngIf="!loading">{{ isEdit ? 'Guardar cambios' : 'Crear usuario' }}</span>
          <span *ngIf="loading" class="spinner"></span>
        </button>
      </div>
    </form>
  </div>
</div>
