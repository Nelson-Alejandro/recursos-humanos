<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="12" fill="#4F46E5"/>
        <path d="M14 34L24 14L34 34H14Z" fill="white" opacity="0.9"/>
        <circle cx="24" cy="28" r="4" fill="#818CF8"/>
      </svg>
      <h1>GestiónRRHH</h1>
    </div>
    <p class="subtitle">Ingresa tus credenciales para continuar</p>

    <div class="alert-error" *ngIf="error">{{ error }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" type="text" [(ngModel)]="username" name="username"
               placeholder="Tu nombre de usuario" autocomplete="username"/>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="password" name="password"
                 placeholder="••••••••" autocomplete="current-password"/>
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword" tabindex="-1">
            <svg *ngIf="!showPassword" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg *ngIf="showPassword" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18M10.584 10.587a2 2 0 002.828 2.83M9.363 5.365A9.466 9.466 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.523 10.523 0 01-1.948 3.448M6.61 6.61A10.523 10.523 0 002.458 12c1.274 4.057 5.065 7 9.542 7a9.477 9.477 0 004.635-1.21"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Ingresar</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>
  </div>
</div>
